<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#2d1b0e">
  <link rel="manifest" href="manifest.json">
  <title>Family · The Nest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/shared.css">
  <link rel="stylesheet" href="css/family.css">
</head>
<body>
  <div class="app-page">

    <header class="top-bar">
      <div class="page-title">The Family</div>
      <button class="leave-btn" id="leaveBtn">Leave nest</button>
    </header>

    <main class="scroll-body">

      <div class="nest-hero">
        <div class="nest-big">🪺</div>
        <div class="nest-stats" id="nestStats"></div>
      </div>

      <div class="section-head">Members</div>
      <div id="memberCards"></div>

      <div class="section-head" style="margin-top:1.6rem">Streak Calendar</div>
      <div class="streak-cal" id="streakCal"></div>

      <div class="danger-zone">
        <button class="reset-btn" id="resetBtn">Reset all data</button>
        <p class="reset-note">This permanently deletes all answers</p>
      </div>
    </main>

    <nav class="tab-bar">
      <a href="home.html" class="tab"><span class="ti">🏡</span><span class="tl">Home</span></a>
      <a href="prompts.html" class="tab"><span class="ti">💬</span><span class="tl">Prompts</span></a>
      <a href="memory.html" class="tab"><span class="ti">📖</span><span class="tl">Memory</span></a>
      <a href="family.html" class="tab active"><span class="ti">👨‍👩‍👧‍👦</span><span class="tl">Family</span></a>
    </nav>
  </div>

  <script src="js/state.js"></script>
  <script src="js/family.js"></script>
</body>
</html>
