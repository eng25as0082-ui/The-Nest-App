<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="The Nest">
  <meta name="theme-color" content="#2d1b0e">
  <link rel="manifest" href="manifest.json">
  <title>The Nest 🪺</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/shared.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <div class="login-page">

    <div class="fireflies">
      <span class="ff ff1"></span><span class="ff ff2"></span><span class="ff ff3"></span>
      <span class="ff ff4"></span><span class="ff ff5"></span><span class="ff ff6"></span>
      <span class="ff ff7"></span><span class="ff ff8"></span>
    </div>

    <div class="login-wrap">
      <div class="brand">
        <div class="nest-glyph">🪺</div>
        <h1>The Nest</h1>
        <p class="tagline">A warm little corner for your family</p>
      </div>

      <div class="login-card">
        <p class="who-label">Who's home today?</p>
        <div class="member-list" id="memberList"></div>
      </div>

      <p class="footer-note">Your private family space · No accounts needed</p>
    </div>
  </div>

  <script src="js/state.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
